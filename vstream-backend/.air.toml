root = "."
tmp_dir = "tmp"

[build]
  # Perintah build untuk Windows (.exe)
  cmd = "go build -o ./tmp/main.exe ."
  # Perintah menjalankan binary hasil build
  bin = "./tmp/main.exe"
  # Ekstensi file yang diawasi
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  # Folder yang diabaikan (PENTING: Abaikan folder data agar tidak restart saat DB update)
  exclude_dir = ["assets", "tmp", "vendor", "data"]
  # Abaikan file spesifik
  exclude_file = []
  # Delay sebelum rebuild (ms)
  delay = 1000
  # Stop proses lama sebelum restart
  stop_on_error = true
  # Log warna-warni
  log = "air.log"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"